services:
  - type: web
    name: nexus-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: nexus-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://nexus-ai.vercel.app
    healthCheckPath: /health

databases:
  - name: nexus-db
    plan: free
    region: singapore
    databaseType: postgres
    ipAllowList: []

  - name: nexus-redis
    plan: free
    region: singapore
    databaseType: redis
