version: "3.9"

x-common: &common
  restart: unless-stopped
  networks:
    - nexus-network

services:
  postgres:
    <<: *common
    image: pgvector/pgvector:pg17
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    <<: *common
    image: minio/minio:latest
    container_name: nexus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    <<: *common
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    <<: *common
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
    container_name: nexus-web
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next

  ai-engine:
    <<: *common
    build:
      context: ../../ai-engine
      dockerfile: Dockerfile
    container_name: nexus-ai-engine
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  nexus-network:
    driver: bridge
